<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平安证券预发布版本体验报告</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <h1>平安证券预发布版本体验报告</h1>
    <div class="version-selector-container">
      <label for="versionSelector" class="version-label">版本：</label>
      <select id="versionSelector" class="version-selector">
        <option value="10.6.7" selected>v10.6.7</option>
        <option value="10.6.3">v10.6.3</option>
      </select>
    </div>
  </nav>

  <button class="sidebar-toggle" id="sidebarToggle">
    <span id="toggleIcon">‹</span>
  </button>

  <aside class="sidebar" id="sidebar">
    <nav>
      <a href="#overview" class="nav-link active">体验概述</a>
      <a href="#highlights" class="nav-link">亮点体验</a>
      <a href="#issues" class="nav-link">问题与建议</a>
      <a href="#statistics" class="nav-link">问题统计</a>
      <a href="#evaluation" class="nav-link">总体评价</a>
      <a href="#summary" class="nav-link">总结</a>
    </nav>
  </aside>

  <main class="main-content" id="mainContent">
    <section id="overview" class="section">
      <h2>体验概述</h2>
      <div class="score-card" id="scoreCard"></div>
      <p id="overviewText"></p>
    </section>

    <section id="highlights" class="section">
      <h2>亮点体验</h2>
      <div class="highlight-list" id="highlightsList"></div>
    </section>

    <section id="issues" class="section">
      <h2>问题与建议</h2>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="P0">P0 亟待修复</button>
        <button class="filter-btn" data-filter="P1">P1 重要</button>
        <button class="filter-btn" data-filter="P2">P2 一般</button>
        <button class="filter-btn" data-filter="P3">P3 轻微</button>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-module="all">全部模块</button>
        <button class="filter-btn" data-module="对话交互">对话交互</button>
        <button class="filter-btn" data-module="消息收藏">消息收藏</button>
        <button class="filter-btn" data-module="数据脱敏">数据脱敏</button>
        <button class="filter-btn" data-module="历史消息">历史消息</button>
        <button class="filter-btn" data-module="基金列表">基金列表</button>
        <button class="filter-btn" data-module="财小安唤起">财小安唤起</button>
        <button class="filter-btn" data-module="ETF功能">ETF功能</button>
        <button class="filter-btn" data-module="能力介绍">能力介绍</button>
        <button class="filter-btn" data-module="选股功能">选股功能</button>
        <button class="filter-btn" data-module="盯盘功能">盯盘功能</button>
        <button class="filter-btn" data-module="持仓查询">持仓查询</button>
      </div>
      <div id="issuesList"></div>
    </section>

    <section id="statistics" class="section">
      <h2>问题统计</h2>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-container">
        <canvas id="severityChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="moduleChart"></canvas>
      </div>
    </section>

    <section id="evaluation" class="section">
      <h2>总体评价</h2>
      <div id="evaluationContent"></div>
    </section>

    <section id="summary" class="section">
      <h2>总结</h2>
      <p id="summaryText"></p>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeLightbox">&times;</span>
    <span class="nav-btn prev-btn" id="prevImage">&lang;</span>
    <img id="lightboxImage" src="" alt="">
    <video id="lightboxVideo" controls playsinline style="display: none;"></video>
    <span class="nav-btn next-btn" id="nextImage">&rang;</span>
  </div>

  <button class="back-to-top" id="backToTop">
    ↑
  </button>

  <script src="js/data/v10.6.7.js"></script>
  <script src="js/data/v10.6.3.js"></script>
  <script src="js/data/index.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
